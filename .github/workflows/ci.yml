name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3

      # `gradlew` ships in the openapi-generator Kotlin output but its
      # +x bit doesn't always survive `git clone` (depends on
      # `core.fileMode` on the runner). chmod is idempotent and cheap.
      - name: chmod gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon
        env:
          JAVA_OPTS: -Xmx4g
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g

      - name: Test
        run: ./gradlew test --no-daemon
        env:
          JAVA_OPTS: -Xmx4g
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g
