name: publish

# Builds the Kotlin SDK jar+sources+javadoc and publishes them to
# GitHub Packages on release. GitHub Packages uses the workflow's
# built-in `GITHUB_TOKEN` — no external secret to configure. The token
# needs `packages: write`, granted by the `permissions:` block below.
#
# Consumers add the GitHub Packages repo to their build:
#
#   repositories {
#       maven {
#           url = uri("https://maven.pkg.github.com/client-api/pmg-kotlin")
#           credentials {
#               username = System.getenv("GITHUB_ACTOR")
#               password = System.getenv("GITHUB_TOKEN")  // any token with read:packages
#           }
#       }
#   }
#   dependencies {
#       implementation("com.clientapi:pmg:2026.5.23")
#   }

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # The release tag is the authoritative version source. Rewrite the
      # gradle script to use the tag value (minus the leading `v`). The
      # build.gradle template hardcodes `version 'X.Y.Z'` at the top and
      # repeats `version = 'X.Y.Z'` inside `publications.maven` — match
      # both. Patterns are anchored to start-of-line + (for the second)
      # leading whitespace so they don't clobber unrelated `*_version`
      # assignments (e.g. `ext.kotlin_version = '2.2.20'`).
      - name: Set version from release tag
        if: github.event_name == 'release'
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME#v}"
          echo "Using version: $TAG (from tag $GITHUB_REF_NAME)"
          sed -i -E "0,/^version '[^']*'/{s/^version '[^']*'/version '${TAG}'/}" build.gradle
          sed -i -E "s/^([[:space:]]+)version = '[^']*'/\1version = '${TAG}'/" build.gradle
          grep -E "^version |^[[:space:]]+version = " build.gradle

      - name: Grant execute permission on gradlew
        run: chmod +x ./gradlew

      - name: Publish to GitHub Packages
        run: ./gradlew publish --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
